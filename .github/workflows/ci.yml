name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - run: npm run typecheck

      - name: Build (tsc)
        run: npm run build

      - name: Smoke (echo only)
        run: npm run smoke
        env:
          SMOKE_AGENTS: echo
          SMOKE_LOG: warn
