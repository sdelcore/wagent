name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - run: npm run typecheck

      - run: npm run build

      - name: Pack tarball
        run: npm pack

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            wagent-*.tgz
          generate_release_notes: true
